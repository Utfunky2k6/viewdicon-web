<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Viewdicon — Jollof TV · African Broadcast Network</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --night:#070a05; --earth:#0c1109; --earth2:#111a0d; --surface:#18250f;
  --g:#1a7c3e; --gl:#4ade80; --gs:rgba(26,124,62,.15);
  --gold:#d4a017; --goldl:#fbbf24; --golds:rgba(212,160,23,.12);
  --fire:#e07b00; --firel:#fb923c; --fires:rgba(224,123,0,.12);
  --red:#b22222; --redl:#ef4444;
  --purple:#7c3aed; --purpll:#c084fc;
  --blue:#0369a1; --bluel:#7dd3fc;
  --border:rgba(255,255,255,0.07);
  --text:#edf7e8; --dim:rgba(255,255,255,.42); --faint:rgba(255,255,255,.13);
  --ease:cubic-bezier(.4,0,.2,1);
  --station-a:#e07b00; /* Village Reality */
  --station-b:#b22222; /* LIVE */
  --station-c:#d4a017; /* Jollof Broadcast */
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#030603;font-family:'DM Sans',sans-serif;color:var(--text)}
.shell{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 35% 40%,#091a05 0%,#030603 70%)}
.phone{width:393px;height:852px;border-radius:52px;overflow:hidden;
  border:8px solid #151515;
  box-shadow:0 0 0 1px #202020,0 50px 140px rgba(0,0,0,.97),0 0 80px rgba(212,160,23,.05);
  display:flex;flex-direction:column;background:var(--night);position:relative}
.island{position:absolute;top:10px;left:50%;transform:translateX(-50%);
  width:126px;height:36px;border-radius:20px;background:#000;z-index:200;
  display:flex;align-items:center;justify-content:space-between;padding:0 14px}
.i-cam{width:10px;height:10px;border-radius:50%;background:#111;border:2px solid #222}
.i-rec{display:flex;align-items:center;gap:5px}
.i-dot{width:7px;height:7px;border-radius:50%;background:#ef4444;
  box-shadow:0 0 10px #ef4444;animation:recblink 1s ease-in-out infinite}
@keyframes recblink{0%,100%{opacity:.5}50%{opacity:1}}
.i-lbl{font-size:9px;font-weight:700;color:#ef4444;letter-spacing:.06em}
.sb{height:50px;padding:0 20px;display:flex;align-items:flex-end;justify-content:space-between;
  padding-bottom:8px;flex-shrink:0;transition:all .4s;background:var(--earth2)}
.sb-t{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;letter-spacing:-.2px}
.sb-r{display:flex;align-items:center;gap:7px}
.sb-pill{font-size:9px;font-weight:700;padding:2px 10px;border-radius:99px;border:1px solid;transition:all .3s}
.screens{flex:1;position:relative;overflow:hidden}
.scr{position:absolute;inset:0;display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .32s var(--ease);will-change:transform}
.scr.prev{transform:translateX(-30%)}
.scr.curr{transform:translateX(0)}
.bnav{height:74px;display:flex;align-items:flex-start;padding-top:9px;
  justify-content:space-around;flex-shrink:0;background:var(--earth2);border-top:1px solid var(--border)}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;
  padding:4px 12px;border-radius:14px;transition:all .2s;position:relative}
.ni:active{transform:scale(.9)}
.ni-i{font-size:21px;line-height:1}
.ni-l{font-size:10px;font-weight:600;color:rgba(255,255,255,.2);transition:color .2s}
.ni.act{background:rgba(212,160,23,.1)}
.ni.act .ni-l{color:#fbbf24}
.ni-dot{position:absolute;top:2px;right:8px;width:7px;height:7px;border-radius:50%;background:#ef4444;border:1.5px solid var(--earth2)}
.tv-home{background:var(--night);flex:1;display:flex;flex-direction:column;overflow:hidden}
.tv-hdr{padding:10px 14px 0;background:var(--earth2);flex-shrink:0}
.tv-logo-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.tv-logo{font-family:'Sora',sans-serif;font-size:22px;font-weight:900;letter-spacing:-.5px;
  background:linear-gradient(135deg,#fbbf24,#e07b00,#d4a017);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tv-logo-sub{font-size:10px;font-weight:700;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-top:-2px}
.tv-signal{display:flex;align-items:center;gap:4px;margin-left:auto}
.sig-dot{width:6px;height:6px;border-radius:50%;background:#ef4444;animation:recblink 1s ease-in-out infinite}
.sig-txt{font-size:9px;font-weight:700;color:#ef4444;letter-spacing:.06em}
.tv-hdr-acts{display:flex;gap:7px}
.thact{width:32px;height:32px;border-radius:50%;background:var(--faint);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:all .2s}
.thact:active{transform:scale(.88)}
.live-strip{background:linear-gradient(90deg,#1a0500,#1a1000,#1a0500);
  border-bottom:1px solid rgba(212,160,23,.15);padding:8px 14px;
  display:flex;align-items:center;gap:8px;flex-shrink:0;overflow:hidden;position:relative}
.ls-label{font-size:10px;font-weight:700;color:#fbbf24;letter-spacing:.08em;text-transform:uppercase;flex-shrink:0}
.ls-sep{width:1px;height:14px;background:rgba(212,160,23,.2)}
.ls-ticker{font-size:11px;color:rgba(255,255,255,.6);flex:1;overflow:hidden;white-space:nowrap;
  animation:ticker 20s linear infinite}
@keyframes ticker{0%{transform:translateX(100%)}100%{transform:translateX(-200%)} }
.ls-actions{display:flex;gap:6px;flex-shrink:0}
.lsa{padding:4px 10px;border-radius:99px;font-size:10px;font-weight:700;cursor:pointer;transition:all .2s}
.lsa:active{transform:scale(.9)}
.lsa-r{background:#b22222;color:#fff}
.lsa-g{background:rgba(26,124,62,.2);color:#4ade80;border:1px solid rgba(26,124,62,.3)}
.stations-section{padding:10px 14px 6px;flex-shrink:0}
.sec-title{font-family:'Sora',sans-serif;font-size:13px;font-weight:800;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sec-title em{font-style:normal;font-size:10px;font-weight:600;color:var(--dim)}
.stations-row{display:flex;gap:8px}
.station-card{flex:1;border-radius:14px;overflow:hidden;cursor:pointer;transition:all .22s;position:relative;border:1.5px solid}
.station-card:active{transform:scale(.95)}
.sc-thumb{height:90px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.sc-emoji{font-size:40px;z-index:1;position:relative}
.sc-bg{position:absolute;inset:0;opacity:.3}
.sc-live-badge{position:absolute;top:6px;left:6px;display:flex;align-items:center;gap:3px;
  background:rgba(0,0,0,.7);padding:3px 7px;border-radius:99px}
.sclb-dot{width:5px;height:5px;border-radius:50%;background:#ef4444;animation:recblink 1s ease-in-out infinite}
.sclb-txt{font-size:8px;font-weight:700;color:#fff}
.sc-viewers{position:absolute;top:6px;right:6px;font-size:8px;font-weight:700;
  color:rgba(255,255,255,.7);background:rgba(0,0,0,.6);padding:2px 6px;border-radius:99px}
.sc-info{padding:8px 10px}
.sc-number{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.sc-name{font-family:'Sora',sans-serif;font-size:11px;font-weight:800;color:var(--text);line-height:1.3}
.sc-now{font-size:9px;color:var(--dim);margin-top:2px;line-height:1.4}
.sta-a{background:rgba(224,123,0,.06);border-color:rgba(224,123,0,.2)}
.sta-a .sc-number{color:var(--station-a)}
.sta-a .sc-bg{background:linear-gradient(135deg,#e07b00,#1a0500)}
.sta-b{background:rgba(178,34,34,.06);border-color:rgba(178,34,34,.2)}
.sta-b .sc-number{color:var(--station-b)}
.sta-b .sc-bg{background:linear-gradient(135deg,#b22222,#050a00)}
.sta-c{background:rgba(212,160,23,.06);border-color:rgba(212,160,23,.2)}
.sta-c .sc-number{color:var(--station-c)}
.sta-c .sc-bg{background:linear-gradient(135deg,#d4a017,#1a1000)}
.tv-guide{flex:1;overflow-y:auto}
.tv-guide::-webkit-scrollbar{width:0}
.tg-section{padding:10px 14px 4px;font-family:'Sora',sans-serif;font-size:12px;font-weight:700;color:var(--dim);
  display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.07em}
.tg-section::after{content:'';flex:1;height:1px;background:var(--border)}
.prog-row{display:flex;gap:8px;padding:4px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
.prog-row:active{background:rgba(255,255,255,.04)}
.prog-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);width:46px;flex-shrink:0;padding-top:2px}
.prog-station{width:3px;border-radius:99px;flex-shrink:0;align-self:stretch}
.prog-info{flex:1;padding:6px 0}
.prog-title{font-family:'Sora',sans-serif;font-size:12px;font-weight:700;color:var(--text);line-height:1.3}
.prog-sub{font-size:10px;color:var(--dim);margin-top:2px;line-height:1.4}
.prog-tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.prog-tag{font-size:8px;font-weight:700;border-radius:99px;padding:2px 7px;border:1px solid}
.prog-live{background:rgba(239,68,68,.12);color:#f87171;border-color:rgba(239,68,68,.2)}
.prog-ai{background:rgba(124,58,237,.12);color:#c084fc;border-color:rgba(124,58,237,.2)}
.prog-ad{background:rgba(212,160,23,.1);color:#fbbf24;border-color:rgba(212,160,23,.2)}
.prog-village{background:rgba(26,124,62,.1);color:#4ade80;border-color:rgba(26,124,62,.2)}
.prog-action{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px;padding-top:6px}
.prog-notify{font-size:10px;color:var(--dim);cursor:pointer;transition:color .2s}
.prog-notify:active{color:#fbbf24}
.prog-now-badge{font-size:8px;font-weight:700;background:#ef4444;color:#fff;border-radius:99px;padding:2px 7px}
.prog-ai-gen{font-size:8px;font-weight:700;background:rgba(124,58,237,.15);color:#c084fc;border-radius:99px;padding:2px 7px}
.sta-screen{background:var(--night);flex:1;display:flex;flex-direction:column;overflow:hidden}
.stn-hdr{padding:10px 14px;flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.stn-hdr-bg{position:absolute;inset:0;opacity:.08;pointer-events:none}
.stn-row{display:flex;align-items:center;gap:10px;position:relative;z-index:1}
.stn-back{width:32px;height:32px;border-radius:50%;background:var(--faint);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;transition:all .2s}
.stn-back:active{transform:scale(.85)}
.stn-logo{font-family:'Sora',sans-serif;font-size:14px;font-weight:900;flex:1}
.stn-signal{display:flex;align-items:center;gap:5px}
.stn-prog-bar{background:var(--earth2);padding:6px 14px;flex-shrink:0}
.spb-inner{background:rgba(255,255,255,.04);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px}
.spb-ico{font-size:16px;flex-shrink:0}
.spb-info{flex:1;min-width:0}
.spb-title{font-family:'Sora',sans-serif;font-size:12px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.spb-sub{font-size:10px;color:var(--dim);margin-top:1px}
.spb-next{font-size:9px;font-weight:700;color:var(--gold);border:1px solid rgba(212,160,23,.2);border-radius:99px;padding:2px 8px;flex-shrink:0}
.reality-stage{flex-shrink:0;position:relative;background:#000;overflow:hidden}
.rst-main{width:100%;height:220px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.rst-bg{position:absolute;inset:0;opacity:.2}
.rst-host{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;padding-bottom:16px}
.rst-host-av{font-size:80px;filter:drop-shadow(0 0 20px rgba(212,160,23,.3))}
.pip-self{position:absolute;bottom:10px;right:10px;width:72px;height:90px;border-radius:10px;
  background:rgba(26,124,62,.3);border:2px solid #4ade80;overflow:hidden;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;z-index:10}
.pip-self-av{font-size:28px}
.pip-self-lbl{font-size:8px;font-weight:700;color:#4ade80;background:rgba(0,0,0,.6);padding:1px 5px;border-radius:99px}
.guests-row{display:flex;gap:4px;padding:6px 8px;background:rgba(0,0,0,.8)}
.guest-box{flex:1;height:60px;border-radius:8px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;background:rgba(255,255,255,.05)}
.gb-av{font-size:22px}
.gb-name{font-size:8px;font-weight:700;color:rgba(255,255,255,.7);text-align:center;line-height:1.2;padding:0 2px}
.gb-speak{position:absolute;bottom:4px;right:4px;width:8px;height:8px;border-radius:50%;background:#4ade80;animation:recblink 1s ease-in-out infinite}
.gb-muted{position:absolute;bottom:4px;right:4px;font-size:9px}
.rst-overlay{position:absolute;top:8px;left:8px;right:8px;display:flex;align-items:flex-start;justify-content:space-between;z-index:10}
.rst-station-badge{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.7);border-radius:8px;padding:5px 9px}
.rsb-dot{width:6px;height:6px;border-radius:50%;background:#ef4444;animation:recblink 1s ease-in-out infinite}
.rsb-txt{font-size:9px;font-weight:700}
.rst-viewers{font-size:11px;font-weight:700;color:rgba(255,255,255,.7);background:rgba(0,0,0,.6);padding:4px 9px;border-radius:99px}
.lower-third{background:linear-gradient(90deg,rgba(224,123,0,.95),rgba(180,80,0,.95));padding:6px 12px;
  display:flex;align-items:center;gap:8px;flex-shrink:0}
.lt-tag{font-family:'Sora',sans-serif;font-size:9px;font-weight:900;color:#fff;letter-spacing:.08em;text-transform:uppercase;flex-shrink:0}
.lt-sep{width:1px;height:12px;background:rgba(255,255,255,.3)}
.lt-ticker{font-size:11px;color:#fff;overflow:hidden;white-space:nowrap;flex:1}
.reality-scroll{flex:1;overflow-y:auto}
.reality-scroll::-webkit-scrollbar{width:0}
.chat-feed{padding:8px 12px}
.cf-item{display:flex;gap:7px;margin-bottom:7px;animation:cfin .25s ease}
@keyframes cfin{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.cf-av{width:24px;height:24px;border-radius:50%;font-size:12px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.07);flex-shrink:0}
.cf-body{flex:1}
.cf-name{font-size:10px;font-weight:700;margin-bottom:1px}
.cf-msg{font-size:12px;color:rgba(255,255,255,.75);line-height:1.5}
.cf-spray{display:inline-flex;align-items:center;gap:4px;background:rgba(212,160,23,.1);
  border:1px solid rgba(212,160,23,.2);border-radius:99px;padding:2px 9px;font-size:10px;font-weight:700;color:#fbbf24}
.react-strip{padding:8px 12px;display:flex;gap:6px;border-top:1px solid var(--border);flex-shrink:0}
.rbtn{flex:1;padding:10px;border-radius:10px;border:none;font-size:11px;font-weight:700;
  cursor:pointer;font-family:'Sora',sans-serif;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .2s}
.rbtn:active{transform:scale(.92)}
.rbtn-spray{background:rgba(212,160,23,.15);color:#fbbf24;border:1px solid rgba(212,160,23,.25)}
.rbtn-vote{background:rgba(26,124,62,.15);color:#4ade80;border:1px solid rgba(26,124,62,.25)}
.rbtn-join{background:#e07b00;color:#fff}
.rbtn-share{background:rgba(255,255,255,.07);color:var(--dim)}
.ad-slot{margin:8px 12px;background:linear-gradient(135deg,#1a1800,#1a1200);
  border:1px solid rgba(212,160,23,.2);border-radius:12px;overflow:hidden}
.ad-label{background:rgba(212,160,23,.15);padding:4px 12px;font-size:9px;font-weight:700;
  color:#fbbf24;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:5px}
.ad-body{padding:10px 12px;display:flex;gap:10px;align-items:center}
.ad-ico{font-size:32px;flex-shrink:0}
.ad-title{font-family:'Sora',sans-serif;font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.ad-desc{font-size:11px;color:var(--dim);line-height:1.5}
.ad-cta{margin-top:8px;padding:8px 14px;background:#d4a017;border:none;border-radius:8px;
  font-size:11px;font-weight:700;color:#111;cursor:pointer;font-family:'Sora',sans-serif;transition:all .2s}
.ad-cta:active{transform:scale(.95)}
.ad-slot-req{margin:6px 12px 10px;font-size:10px;color:rgba(212,160,23,.4);text-align:center;cursor:pointer;transition:color .2s}
.ad-slot-req:active{color:#fbbf24}
.live-screen{background:#0a0300}
.jollof-scroll{flex:1;overflow-y:auto;scroll-snap-type:y mandatory}
.jollof-scroll::-webkit-scrollbar{display:none}
.reel{height:800px;scroll-snap-align:start;position:relative;overflow:hidden;flex-shrink:0}
.reel-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.reel-bg-img{font-size:120px;opacity:.12;transform:scale(1.2)}
.reel-gradient{position:absolute;inset:0;background:linear-gradient(transparent 20%,rgba(0,0,0,.9))}
.adinkra-overlay{position:absolute;inset:0;pointer-events:none;opacity:.04;
  background-image:repeating-linear-gradient(45deg,#d4a017 0px,#d4a017 1px,transparent 0,transparent 50%);
  background-size:18px 18px}
.reel-type-bar{position:absolute;top:0;left:0;right:0;height:4px;z-index:10}
.reel-overlay{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;justify-content:space-between;padding:10px}
.reel-top{display:flex;align-items:center;gap:8px}
.reel-back{background:rgba(0,0,0,.5);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer}
.reel-station-pill{font-size:9px;font-weight:700;border-radius:99px;padding:3px 9px;border:1px solid;display:flex;align-items:center;gap:4px}
.reel-live-indicator{display:flex;align-items:center;gap:4px;background:rgba(178,34,34,.8);padding:4px 9px;border-radius:99px}
.rli-dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:recblink .8s ease-in-out infinite}
.rli-txt{font-size:10px;font-weight:700;color:#fff}
.reel-viewers{font-size:11px;font-weight:700;color:rgba(255,255,255,.8);background:rgba(0,0,0,.5);padding:3px 9px;border-radius:99px;margin-left:auto}
.reel-right{position:absolute;right:12px;bottom:180px;display:flex;flex-direction:column;gap:14px;z-index:10}
.ra-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all .2s}
.ra-btn:active{transform:scale(.85)}
.ra-ico{width:42px;height:42px;border-radius:50%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:18px;border:1.5px solid rgba(255,255,255,.15)}
.ra-count{font-size:10px;font-weight:700;color:rgba(255,255,255,.8)}
.reel-bottom{z-index:10;position:absolute;bottom:0;left:0;right:0;padding:12px 14px 12px}
.rb-streamer{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.rb-av{width:40px;height:40px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.rb-name{font-family:'Sora',sans-serif;font-size:14px;font-weight:800;color:#fff}
.rb-village{font-size:10px;color:rgba(255,255,255,.6);margin-top:2px;display:flex;align-items:center;gap:5px}
.rb-follow{padding:6px 14px;border-radius:99px;border:1.5px solid #fff;font-size:10px;font-weight:700;color:#fff;cursor:pointer;margin-left:auto;flex-shrink:0;transition:all .2s}
.rb-follow:active{background:rgba(255,255,255,.2)}
.rb-desc{font-size:12px;color:rgba(255,255,255,.8);line-height:1.6;margin-bottom:10px}
.market-strip-reel{background:rgba(0,0,0,.85);border-radius:12px;padding:10px 12px;margin-bottom:8px}
.msr-product{font-family:'Sora',sans-serif;font-size:14px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.msr-price{font-size:18px;font-weight:900;color:#fbbf24}
.msr-btns{display:flex;gap:6px;margin-top:8px}
